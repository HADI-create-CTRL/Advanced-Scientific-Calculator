<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Scientific Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#111827;
transition:.3s;
}

.light{
background:#f4f4f4;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.calc{
width:420px;
padding:20px;
border-radius:20px;
background:#1f2937;
}

.light .calc{
background:white;
}

.display{
width:100%;
height:80px;
font-size:28px;
padding:15px;
text-align:right;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:10px;
}

button{
border:none;
cursor:pointer;
padding:14px;
border-radius:10px;
background:#374151;
color:white;
font-size:16px;
}

.light button{
background:#ddd;
color:black;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.history{
width:260px;
padding:20px;
background:#222;
color:white;
border-radius:20px;
overflow:auto;
max-height:600px;
}

.light .history{
background:white;
color:black;
}

canvas{
margin-top:20px;
background:white;
border-radius:10px;
}

.item{
margin:8px 0;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="calc">

<input class="display" id="display" readonly>

<div class="controls">
<button onclick="toggleTheme()">Theme</button>
<button onclick="toggleMode()" id="mode">RAD</button>
<button onclick="plot()">Graph</button>
</div>

<div class="grid">

<button onclick="add('sin(')">sin</button>
<button onclick="add('cos(')">cos</button>
<button onclick="add('tan(')">tan</button>
<button onclick="add('sqrt(')">√</button>
<button onclick="clearDisplay()">C</button>

<button onclick="add('log(')">log</button>
<button onclick="add('ln(')">ln</button>
<button onclick="add('pi')">π</button>
<button onclick="add('e')">e</button>
<button onclick="add('^')">^</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>
<button onclick="add('%')">%</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>
<button onclick="add('(')">(</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">−</button>
<button onclick="add(')')">)</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="add('E')">Sci</button>
<button onclick="add('+')">+</button>
<button onclick="calculate()">=</button>

</div>

<canvas id="graph" width="380" height="220"></canvas>

</div>

<div class="history">
<h2>History</h2>
<div id="history"></div>
</div>

</div>

<script>

const display=document.getElementById("display");
const history=document.getElementById("history");

let degree=false;

function add(v){
display.value+=v;
}

function clearDisplay(){
display.value="";
}

function toggleTheme(){
document.body.classList.toggle("light");
}

function toggleMode(){
degree=!degree;

document.getElementById("mode").innerText=
degree?"DEG":"RAD";
}

function convertTrig(exp){

if(degree){

exp=exp
.replace(/sin\((.*?)\)/g,
(_,v)=>`Math.sin((${v})*Math.PI/180)`)

.replace(/cos\((.*?)\)/g,
(_,v)=>`Math.cos((${v})*Math.PI/180)`)

.replace(/tan\((.*?)\)/g,
(_,v)=>`Math.tan((${v})*Math.PI/180)`);

}

else{

exp=exp
.replace(/sin\(/g,"Math.sin(")
.replace(/cos\(/g,"Math.cos(")
.replace(/tan\(/g,"Math.tan(");

}

return exp;

}

function evaluate(exp){

exp=convertTrig(exp);

exp=exp
.replace(/sqrt\(/g,"Math.sqrt(")
.replace(/log\(/g,"Math.log10(")
.replace(/ln\(/g,"Math.log(")
.replace(/pi/g,"Math.PI")
.replace(/e/g,"Math.E")
.replace(/\^/g,"**");

return eval(exp);

}

function calculate(){

try{

let input=display.value;

let result=evaluate(input);

display.value=result;

let div=document.createElement("div");

div.className="item";

div.innerText=
`${input} = ${result}`;

history.prepend(div);

}

catch{

display.value="Error";

}

}

document.addEventListener("keydown",e=>{

if(/[0-9+\-*/().]/.test(e.key))
display.value+=e.key;

if(e.key==="Enter")
calculate();

if(e.key==="Backspace")
display.value=
display.value.slice(0,-1);

});

function plot(){

let ctx=
document
.getElementById("graph")
.getContext("2d");

ctx.clearRect(0,0,380,220);

ctx.beginPath();

for(let x=-10;x<10;x+=0.1){

try{

let exp=
display.value
.replace(/x/g,`(${x})`);

let y=
evaluate(exp);

let px=
190+x*15;

let py=
110-y*15;

if(x===-10)
ctx.moveTo(px,py);

else
ctx.lineTo(px,py);

}catch{}

}

ctx.stroke();

}

</script>

</body>
</html>
