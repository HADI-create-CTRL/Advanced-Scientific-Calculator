<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Advanced Scientific Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root{
  --navy-950:#060912;
  --navy-900:#0b1120;
  --navy-800:#121b30;
  --navy-700:#1b2640;
  --navy-600:#283656;
  --surface:rgba(19,28,49,0.6);
  --surface-strong:rgba(27,38,64,0.78);
  --border:rgba(148,163,184,0.14);
  --border-strong:rgba(148,163,184,0.26);
  --accent:#38bdf8;
  --accent-soft:rgba(56,189,248,0.16);
  --accent-strong:#0ea5e9;
  --amber:#f5b942;
  --amber-soft:rgba(245,185,66,0.14);
  --danger:#f87171;
  --danger-soft:rgba(248,113,113,0.14);
  --text:#e8edf6;
  --text-muted:#8b97ad;
  --text-faint:#5e6a83;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow-deep:0 24px 60px rgba(0,0,0,0.45);
  --font-display:'Space Grotesk','Segoe UI',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
}

body.light{
  --navy-950:#e8ecf3;
  --navy-900:#eef1f6;
  --navy-800:#ffffff;
  --navy-700:#ffffff;
  --navy-600:#dde3ee;
  --surface:rgba(255,255,255,0.66);
  --surface-strong:rgba(255,255,255,0.86);
  --border:rgba(22,32,58,0.1);
  --border-strong:rgba(22,32,58,0.18);
  --accent:#0284c7;
  --accent-soft:rgba(2,132,199,0.1);
  --accent-strong:#0369a1;
  --amber:#b8740a;
  --amber-soft:rgba(184,116,10,0.1);
  --danger:#dc2626;
  --danger-soft:rgba(220,38,38,0.1);
  --text:#16203a;
  --text-muted:#5b6679;
  --text-faint:#8b97ad;
  --shadow-deep:0 24px 60px rgba(22,32,58,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:clamp(16px,4vw,40px);
  background:
    radial-gradient(circle at 15% 0%, rgba(56,189,248,0.08), transparent 45%),
    radial-gradient(circle at 85% 100%, rgba(245,185,66,0.05), transparent 40%),
    var(--navy-950);
  color:var(--text);
  font-family:var(--font-display);
  transition:background .3s ease,color .3s ease;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important;transition-duration:0.001ms !important;}
}

/* ---------- header ---------- */
.app-header{
  width:100%;
  max-width:1080px;
  display:flex;
  align-items:center;
  gap:14px;
}
.app-mark{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--accent),var(--amber));
  color:var(--navy-950);
  font-family:var(--font-mono);
  font-weight:700;font-size:16px;
  flex-shrink:0;
}
.app-header h1{font-size:clamp(18px,2.4vw,22px);font-weight:600;letter-spacing:.2px;}
.app-header p{font-size:13px;color:var(--text-muted);margin-top:2px;}

/* ---------- layout ---------- */
.container{
  display:flex;
  flex-direction:column;
  gap:18px;
  width:100%;
  max-width:1080px;
}
.top-row{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  align-items:flex-start;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:var(--shadow-deep);
  transition:background .3s ease,border-color .3s ease;
}

/* ---------- calculator ---------- */
.calc{
  flex:1 1 460px;
  max-width:520px;
  padding:clamp(16px,2.4vw,22px);
}

.controls-bar{
  display:flex;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.ctrl-btn{
  flex:1;
  min-width:0;
  border:1px solid var(--border-strong);
  background:var(--surface-strong);
  color:var(--text-muted);
  border-radius:var(--radius-sm);
  padding:9px 6px;
  font-family:var(--font-display);
  font-size:12px;
  font-weight:600;
  letter-spacing:.3px;
  cursor:pointer;
  transition:transform .12s ease,color .2s ease,border-color .2s ease,background .2s ease;
}
.ctrl-btn:hover{color:var(--text);border-color:var(--accent);}
.ctrl-btn:active{transform:scale(0.95);}
.ctrl-btn.active{color:var(--navy-950);background:var(--accent);border-color:var(--accent);}
.ctrl-btn.danger:hover{color:var(--danger);border-color:var(--danger);}

/* display panel: the instrument readout */
.display-panel{
  background:linear-gradient(180deg,rgba(0,0,0,0.22),rgba(0,0,0,0.08));
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px 16px 12px;
  margin-bottom:14px;
  box-shadow:inset 0 2px 10px rgba(0,0,0,0.35);
}
body.light .display-panel{box-shadow:inset 0 2px 8px rgba(22,32,58,0.08);}

.status-row{
  display:flex;
  gap:6px;
  min-height:18px;
  margin-bottom:6px;
}
.badge{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:600;
  letter-spacing:.6px;
  padding:2px 7px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent);
  border:1px solid var(--border-strong);
}
.badge.inv{background:var(--amber-soft);color:var(--amber);}

.expr-display{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  color:var(--text-muted);
  font-family:var(--font-mono);
  font-size:16px;
  letter-spacing:.3px;
  text-align:right;
  min-height:22px;
}

.result-preview{
  text-align:right;
  font-family:var(--font-mono);
  font-size:clamp(28px,6vw,38px);
  font-weight:600;
  color:var(--text);
  text-shadow:0 0 18px var(--accent-soft);
  min-height:46px;
  word-break:break-all;
  transition:color .15s ease;
}
.result-preview.error{
  color:var(--danger);
  font-size:16px;
  text-shadow:none;
}
.shake{animation:shake .4s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}

/* ---------- keypad ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:7px;
}
button.key{
  border:none;
  cursor:pointer;
  padding:0;
  height:clamp(38px,8vw,46px);
  border-radius:var(--radius-sm);
  background:var(--navy-700);
  color:var(--text);
  font-family:var(--font-mono);
  font-size:14px;
  font-weight:500;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s ease,background .15s ease,box-shadow .15s ease;
}
button.key:hover{background:var(--navy-600);}
button.key:active{transform:scale(0.92);}

button.key.fn{color:var(--accent);background:var(--accent-soft);}
button.key.op{color:var(--amber);background:var(--amber-soft);font-size:16px;}
button.key.mem{color:var(--text-muted);font-size:12px;font-weight:600;letter-spacing:.3px;}
button.key.equals{
  background:linear-gradient(135deg,var(--accent-strong),var(--accent));
  color:var(--navy-950);
  font-weight:700;
  font-size:16px;
  box-shadow:0 8px 20px var(--accent-soft);
}
button.key.equals:hover{filter:brightness(1.08);}
button.key:focus-visible,.ctrl-btn:focus-visible,.history-item:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

/* ---------- history ---------- */
.history{
  flex:1 1 240px;
  max-width:300px;
  max-height:560px;
  display:flex;
  flex-direction:column;
  padding:18px;
}
.history-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.history-head h2{font-size:14px;font-weight:600;color:var(--text-muted);letter-spacing:.3px;}
.clear-history{
  background:none;border:none;cursor:pointer;
  color:var(--text-faint);font-size:11px;font-family:var(--font-display);
  text-decoration:underline;
}
.clear-history:hover{color:var(--danger);}
.history-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;}
.history-empty{color:var(--text-faint);font-size:12px;padding:8px 2px;}
.history-item{
  cursor:pointer;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 10px;
  background:var(--surface-strong);
  transition:border-color .15s ease,transform .1s ease;
}
.history-item:hover{border-color:var(--accent);transform:translateX(-2px);}
.history-item .expr{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);word-break:break-all;}
.history-item .res{font-size:15px;color:var(--text);font-family:var(--font-mono);font-weight:600;}

/* ---------- graph panel ---------- */
.graph-panel{padding:18px clamp(16px,2.4vw,22px) 16px;width:100%;}
.graph-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.graph-head h2{font-size:14px;font-weight:600;color:var(--text-muted);letter-spacing:.3px;}
.graph-caption{font-size:12px;color:var(--text-faint);font-family:var(--font-mono);}
.graph-caption.error{color:var(--danger);}
canvas{width:100%;height:260px;display:block;border-radius:var(--radius-sm);}

/* ---------- responsive ---------- */
@media (max-width:760px){
  .grid{grid-template-columns:repeat(6,1fr);}
  .top-row{flex-direction:column;}
  .calc,.history{max-width:100%;}
  .history{max-height:240px;}
}
</style>
</head>

<body>

<div class="app-header">
  <div class="app-mark">ƒ(x)</div>
  <div>
    <h1>Advanced Scientific Calculator</h1>
    <p>Trig, logs, memory, and live graphing — with full calculation history.</p>
  </div>
</div>

<div class="container">

  <div class="top-row">

    <div class="calc panel">

      <div class="controls-bar">
        <button class="ctrl-btn" onclick="toggleTheme()" title="Switch color theme">Theme</button>
        <button class="ctrl-btn" id="degBtn" onclick="toggleMode()" title="Toggle degrees / radians">RAD</button>
        <button class="ctrl-btn" id="invBtn" onclick="toggleInv()" title="Inverse functions (asin, 10^x, ...)">INV</button>
        <button class="ctrl-btn" onclick="plot()" title="Graph the current expression (must contain x)">Plot</button>
        <button class="ctrl-btn danger" onclick="clearAll()" title="Clear everything">AC</button>
      </div>

      <div class="display-panel">
        <div class="status-row">
          <span class="badge" id="degBadge">RAD</span>
          <span class="badge inv" id="invBadge" style="display:none;">INV</span>
          <span class="badge" id="memBadge" style="display:none;">M</span>
        </div>
        <input class="expr-display" id="display" readonly inputmode="none" aria-label="Expression">
        <div class="result-preview" id="preview" aria-live="polite">0</div>
      </div>

      <div class="grid">
        <button class="key fn" id="btnSin" onclick="insertFunc('sin')" title="Sine">sin</button>
        <button class="key fn" id="btnCos" onclick="insertFunc('cos')" title="Cosine">cos</button>
        <button class="key fn" id="btnTan" onclick="insertFunc('tan')" title="Tangent">tan</button>
        <button class="key fn" onclick="appendToExpr('pi')" title="Pi">π</button>
        <button class="key fn" onclick="appendToExpr('e')" title="Euler's number">e</button>
        <button class="key" onclick="backspace()" aria-label="Backspace" title="Backspace">⌫</button>

        <button class="key fn" id="btnLog" onclick="insertFunc('log')" title="Base-10 logarithm">log</button>
        <button class="key fn" id="btnLn" onclick="insertFunc('ln')" title="Natural logarithm">ln</button>
        <button class="key fn" id="btnSqrt" onclick="insertFunc('sqrt')" title="Square root">√</button>
        <button class="key" onclick="appendToExpr('(')">(</button>
        <button class="key" onclick="appendToExpr(')')">)</button>
        <button class="key op" onclick="appendToExpr('^')" title="Power">^</button>

        <button class="key" onclick="appendToExpr('7')">7</button>
        <button class="key" onclick="appendToExpr('8')">8</button>
        <button class="key" onclick="appendToExpr('9')">9</button>
        <button class="key op" onclick="appendToExpr('/')" title="Divide">÷</button>
        <button class="key mem" onclick="appendToExpr('%')" title="Modulo (remainder)">mod</button>
        <button class="key fn" onclick="appendToExpr('!')" title="Factorial, e.g. 5!">x!</button>

        <button class="key" onclick="appendToExpr('4')">4</button>
        <button class="key" onclick="appendToExpr('5')">5</button>
        <button class="key" onclick="appendToExpr('6')">6</button>
        <button class="key op" onclick="appendToExpr('*')" title="Multiply">×</button>
        <button class="key mem" onclick="memorySub()" title="Subtract from memory">M−</button>
        <button class="key fn" onclick="appendToExpr('x')" title="Variable x, for graphing">x</button>

        <button class="key" onclick="appendToExpr('1')">1</button>
        <button class="key" onclick="appendToExpr('2')">2</button>
        <button class="key" onclick="appendToExpr('3')">3</button>
        <button class="key op" onclick="appendToExpr('-')" title="Subtract">−</button>
        <button class="key mem" onclick="appendToExpr(formatResult(lastAnswer))" title="Last answer">Ans</button>
        <button class="key mem" onclick="memoryRecall()" title="Recall memory">MR</button>

        <button class="key" onclick="appendToExpr('0')">0</button>
        <button class="key" onclick="appendToExpr('.')">.</button>
        <button class="key mem" onclick="memoryClear()" title="Clear memory">MC</button>
        <button class="key mem" onclick="memoryAdd()" title="Add to memory">M+</button>
        <button class="key op" onclick="appendToExpr('+')" title="Add">+</button>
        <button class="key equals" onclick="calculate()" title="Calculate">=</button>
      </div>

    </div>

    <div class="history panel">
      <div class="history-head">
        <h2>History</h2>
        <button class="clear-history" onclick="clearHistory()">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty" id="historyEmpty">No calculations yet.</div>
      </div>
    </div>

  </div>

  <div class="graph-panel panel">
    <div class="graph-head">
      <h2>Graph</h2>
      <span class="graph-caption" id="plotCaption">Enter an expression containing x, then press Plot.</span>
    </div>
    <canvas id="graph" height="260"></canvas>
  </div>

</div>

<script>
/* ---------------- state ---------------- */
let degreeMode = false;
let invMode = false;
let memory = 0;
let lastAnswer = 0;
let lastPlottedExpr = '';
let historyData = [];

const display = document.getElementById('display');
const preview = document.getElementById('preview');
const degBadge = document.getElementById('degBadge');
const invBadge = document.getElementById('invBadge');
const memBadge = document.getElementById('memBadge');
const degBtn = document.getElementById('degBtn');
const invBtn = document.getElementById('invBtn');
const historyList = document.getElementById('historyList');
const historyEmpty = document.getElementById('historyEmpty');
const plotCaption = document.getElementById('plotCaption');

/* ---------------- function / label maps ---------------- */
const FUNC_DEFS = {
  sin:  {id:'btnSin',  insertNormal:'sin(',  insertInv:'asin(', labelNormal:'sin', labelInv:'sin⁻¹'},
  cos:  {id:'btnCos',  insertNormal:'cos(',  insertInv:'acos(', labelNormal:'cos', labelInv:'cos⁻¹'},
  tan:  {id:'btnTan',  insertNormal:'tan(',  insertInv:'atan(', labelNormal:'tan', labelInv:'tan⁻¹'},
  log:  {id:'btnLog',  insertNormal:'log(',  insertInv:'10^(',  labelNormal:'log', labelInv:'10ˣ'},
  ln:   {id:'btnLn',   insertNormal:'ln(',   insertInv:'e^(',   labelNormal:'ln',  labelInv:'eˣ'},
  sqrt: {id:'btnSqrt', insertNormal:'sqrt(', insertInv:'cbrt(', labelNormal:'√',   labelInv:'∛'},
};

function insertFunc(key){
  const def = FUNC_DEFS[key];
  appendToExpr(invMode ? def.insertInv : def.insertNormal);
}

function refreshFuncLabels(){
  Object.values(FUNC_DEFS).forEach(def=>{
    document.getElementById(def.id).textContent = invMode ? def.labelInv : def.labelNormal;
  });
}

/* ---------------- degree-aware trig helpers ---------------- */
function dSin(deg){ return Math.sin(deg*Math.PI/180); }
function dCos(deg){ return Math.cos(deg*Math.PI/180); }
function dTan(deg){ return Math.tan(deg*Math.PI/180); }
function dAsin(x){ return Math.asin(x)*180/Math.PI; }
function dAcos(x){ return Math.acos(x)*180/Math.PI; }
function dAtan(x){ return Math.atan(x)*180/Math.PI; }

function factorial(n){
  n = Number(n);
  if(!Number.isInteger(n) || n<0) throw new Error('Factorial needs a whole number ≥ 0');
  if(n>170) return Infinity;
  let r=1;
  for(let i=2;i<=n;i++) r*=i;
  return r;
}

/* ---------------- expression compilation ---------------- */
function compileExpression(raw, deg){
  let exp = raw.trim();
  if(exp==='') throw new Error('Empty expression');

  exp = exp.replace(/(\d+(?:\.\d+)?)!/g, 'factorial($1)');

  exp = exp.replace(/\basin\(/g, deg?'dAsin(':'Math.asin(');
  exp = exp.replace(/\bacos\(/g, deg?'dAcos(':'Math.acos(');
  exp = exp.replace(/\batan\(/g, deg?'dAtan(':'Math.atan(');
  exp = exp.replace(/\bsin\(/g,  deg?'dSin(':'Math.sin(');
  exp = exp.replace(/\bcos\(/g,  deg?'dCos(':'Math.cos(');
  exp = exp.replace(/\btan\(/g,  deg?'dTan(':'Math.tan(');
  exp = exp.replace(/\bsqrt\(/g, 'Math.sqrt(');
  exp = exp.replace(/\bcbrt\(/g, 'Math.cbrt(');
  exp = exp.replace(/\blog\(/g,  'Math.log10(');
  exp = exp.replace(/\bln\(/g,   'Math.log(');
  exp = exp.replace(/\bpi\b/g,   'Math.PI');
  exp = exp.replace(/\be\b/g,    'Math.E');
  exp = exp.replace(/\^/g,       '**');

  return exp;
}

function evaluate(raw){
  const compiled = compileExpression(raw, degreeMode);
  const fn = new Function('factorial','dSin','dCos','dTan','dAsin','dAcos','dAtan',
    'return (' + compiled + ')');
  const result = fn(factorial,dSin,dCos,dTan,dAsin,dAcos,dAtan);
  if(typeof result !== 'number' || Number.isNaN(result)) throw new Error('Invalid expression');
  if(!Number.isFinite(result)) throw new Error('Math error — division by zero or overflow');
  return result;
}

function evaluateAtX(raw, xVal){
  const compiled = compileExpression(raw, degreeMode);
  const fn = new Function('factorial','dSin','dCos','dTan','dAsin','dAcos','dAtan','x',
    'return (' + compiled + ')');
  return fn(factorial,dSin,dCos,dTan,dAsin,dAcos,dAtan,xVal);
}

function formatResult(n){
  if(n===0) return '0';
  if(!Number.isFinite(n)) return n>0 ? '∞' : '-∞';
  let rounded = parseFloat(n.toPrecision(12));
  if(Math.abs(rounded)>=1e15 || Math.abs(rounded)<1e-9){
    return rounded.toExponential(6);
  }
  return rounded.toString();
}

/* ---------------- input handling ---------------- */
function appendToExpr(v){
  display.value += v;
  updatePreview();
}

function backspace(){
  display.value = display.value.slice(0,-1);
  updatePreview();
}

function clearAll(){
  display.value = '';
  preview.classList.remove('error');
  updatePreview();
}

function updatePreview(){
  const val = display.value;
  if(val.trim()===''){
    preview.textContent = '0';
    preview.classList.remove('error');
    return;
  }
  try{
    const r = evaluate(val);
    preview.textContent = formatResult(r);
    preview.classList.remove('error');
  }catch(err){
    preview.textContent = '…';
    preview.classList.remove('error');
  }
}

function calculate(){
  const expr = display.value;
  if(expr.trim()==='') return;
  try{
    const result = evaluate(expr);
    const formatted = formatResult(result);
    addHistory(expr, formatted);
    lastAnswer = result;
    display.value = formatted;
    preview.textContent = formatted;
    preview.classList.remove('error');
  }catch(err){
    preview.textContent = err.message || 'Invalid expression';
    preview.classList.add('error','shake');
    setTimeout(()=>preview.classList.remove('shake'), 400);
  }
}

/* ---------------- history ---------------- */
function addHistory(expr, result){
  historyData.unshift({expr, result});
  renderHistory();
}

function renderHistory(){
  historyList.innerHTML = '';
  if(historyData.length===0){
    historyList.appendChild(historyEmpty);
    return;
  }
  historyData.forEach(entry=>{
    const item = document.createElement('div');
    item.className = 'history-item';
    item.tabIndex = 0;
    item.setAttribute('role','button');
    item.setAttribute('aria-label', `Recall ${entry.expr} equals ${entry.result}`);
    item.innerHTML = `<div class="expr">${escapeHtml(entry.expr)}</div><div class="res">${escapeHtml(entry.result)}</div>`;
    item.onclick = ()=>{ display.value = entry.expr; updatePreview(); };
    item.onkeydown = e=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); item.onclick(); } };
    historyList.appendChild(item);
  });
}

function clearHistory(){
  historyData = [];
  renderHistory();
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- memory ---------------- */
function currentValueOrAnswer(){
  return display.value.trim() ? evaluate(display.value) : lastAnswer;
}
function memoryAdd(){
  try{ memory += currentValueOrAnswer(); updateMemBadge(); }
  catch(err){ flashPreviewError(err); }
}
function memorySub(){
  try{ memory -= currentValueOrAnswer(); updateMemBadge(); }
  catch(err){ flashPreviewError(err); }
}
function memoryRecall(){ appendToExpr(formatResult(memory)); }
function memoryClear(){ memory = 0; updateMemBadge(); }
function updateMemBadge(){ memBadge.style.display = memory!==0 ? 'inline-flex' : 'none'; }
function flashPreviewError(err){
  preview.textContent = err.message || 'Invalid expression';
  preview.classList.add('error','shake');
  setTimeout(()=>preview.classList.remove('shake'), 400);
}

/* ---------------- toggles ---------------- */
function toggleTheme(){
  document.body.classList.toggle('light');
  if(lastPlottedExpr) renderPlot();
}
function toggleMode(){
  degreeMode = !degreeMode;
  degBadge.textContent = degreeMode ? 'DEG' : 'RAD';
  degBtn.textContent = degreeMode ? 'DEG' : 'RAD';
  updatePreview();
}
function toggleInv(){
  invMode = !invMode;
  invBadge.style.display = invMode ? 'inline-flex' : 'none';
  invBtn.classList.toggle('active', invMode);
  refreshFuncLabels();
}

/* ---------------- keyboard ---------------- */
document.addEventListener('keydown', e=>{
  if(/^[0-9+\-*/().^%]$/.test(e.key)){
    appendToExpr(e.key);
  }else if(e.key==='Enter'){
    e.preventDefault();
    calculate();
  }else if(e.key==='Backspace'){
    e.preventDefault();
    backspace();
  }else if(e.key==='Escape' || e.key==='Delete'){
    clearAll();
  }
});

/* ---------------- graphing ---------------- */
function setupCanvasResolution(canvas){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const cssWidth = canvas.clientWidth;
  const cssHeight = canvas.clientHeight;
  canvas.width = cssWidth*dpr;
  canvas.height = cssHeight*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx, w:cssWidth, h:cssHeight};
}

function getThemeColors(){
  const light = document.body.classList.contains('light');
  return{
    axis: light? '#5b6679':'#8b97ad',
    grid: light? 'rgba(91,102,121,0.15)':'rgba(139,151,173,0.15)',
    curve: light? '#0284c7':'#38bdf8',
  };
}

function niceStep(raw){
  if(!isFinite(raw) || raw<=0) return 1;
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const n = raw/pow;
  let step;
  if(n<1.5) step=1; else if(n<3) step=2; else if(n<7) step=5; else step=10;
  return step*pow;
}

function plot(){
  const exprRaw = display.value;
  if(!exprRaw.includes('x')){
    plotCaption.textContent = 'Enter an expression containing x to graph it (e.g. sin(x), x^2-3).';
    plotCaption.classList.add('error');
    return;
  }
  plotCaption.classList.remove('error');
  lastPlottedExpr = exprRaw;
  renderPlot();
}

function renderPlot(){
  if(!lastPlottedExpr) return;
  const canvas = document.getElementById('graph');
  const {ctx,w,h} = setupCanvasResolution(canvas);
  const colors = getThemeColors();
  ctx.clearRect(0,0,w,h);

  const xMin=-10, xMax=10;
  const step=(xMax-xMin)/600;
  const samples=[];
  for(let x=xMin;x<=xMax;x+=step){
    try{
      const y = evaluateAtX(lastPlottedExpr, x);
      samples.push(Number.isFinite(y) ? y : null);
    }catch(e){ samples.push(null); }
  }

  const finiteYs = samples.filter(y=>y!==null);
  if(finiteYs.length===0){
    plotCaption.textContent = 'Could not evaluate this function over the visible range.';
    plotCaption.classList.add('error');
    return;
  }

  const sorted = [...finiteYs].sort((a,b)=>a-b);
  const lowIdx = Math.floor(sorted.length*0.02);
  const highIdx = Math.min(sorted.length-1, Math.ceil(sorted.length*0.98));
  let yMin = sorted[lowIdx];
  let yMax = sorted[highIdx];
  if(yMin===yMax){ yMin-=1; yMax+=1; }
  const yPad = (yMax-yMin)*0.12;
  yMin -= yPad; yMax += yPad;

  const plotLeft=42, plotRight=w-14, plotTop=14, plotBottom=h-26;
  const xScale=(plotRight-plotLeft)/(xMax-xMin);
  const yScale=(plotBottom-plotTop)/(yMax-yMin);
  const xToPx = x => plotLeft + (x-xMin)*xScale;
  const yToPx = y => plotBottom - (y-yMin)*yScale;

  ctx.font = '10px "JetBrains Mono", monospace';

  ctx.strokeStyle = colors.grid;
  ctx.fillStyle = colors.axis;
  ctx.lineWidth = 1;
  for(let gx=Math.ceil(xMin/2)*2; gx<=xMax; gx+=2){
    const px = xToPx(gx);
    ctx.beginPath(); ctx.moveTo(px,plotTop); ctx.lineTo(px,plotBottom); ctx.stroke();
    ctx.fillText(String(gx), px-5, plotBottom+13);
  }
  const yStep = niceStep((yMax-yMin)/6);
  for(let gy=Math.ceil(yMin/yStep)*yStep; gy<=yMax; gy+=yStep){
    const py = yToPx(gy);
    ctx.beginPath(); ctx.moveTo(plotLeft,py); ctx.lineTo(plotRight,py); ctx.stroke();
    ctx.fillText(formatResult(Number(gy.toFixed(6))), 3, py+3);
  }

  ctx.strokeStyle = colors.axis;
  ctx.lineWidth = 1.5;
  if(0>=xMin && 0<=xMax){
    const px = xToPx(0);
    ctx.beginPath(); ctx.moveTo(px,plotTop); ctx.lineTo(px,plotBottom); ctx.stroke();
  }
  if(0>=yMin && 0<=yMax){
    const py = yToPx(0);
    ctx.beginPath(); ctx.moveTo(plotLeft,py); ctx.lineTo(plotRight,py); ctx.stroke();
  }

  ctx.strokeStyle = colors.curve;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  let started=false, prevY=null, i=0;
  const jumpThreshold = (yMax-yMin)*0.6;
  for(let x=xMin;x<=xMax;x+=step,i++){
    const y = samples[i];
    if(y===null || y<yMin-(yMax-yMin)*2 || y>yMax+(yMax-yMin)*2){
      started=false; prevY=null; continue;
    }
    const px=xToPx(x), py=yToPx(y);
    if(!started){
      ctx.moveTo(px,py); started=true;
    }else if(prevY!==null && Math.abs(y-prevY)>jumpThreshold){
      ctx.moveTo(px,py);
    }else{
      ctx.lineTo(px,py);
    }
    prevY=y;
  }
  ctx.stroke();

  plotCaption.classList.remove('error');
  plotCaption.textContent = `y = ${lastPlottedExpr}`;
}

function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); };
}
window.addEventListener('resize', debounce(()=>{ if(lastPlottedExpr) renderPlot(); }, 200));

/* init */
updatePreview();
renderHistory();
</script>
